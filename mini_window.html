<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mini Player</title>
  <link rel="stylesheet" href="mini_style.css">
</head>
<body>
  <div class="MiniPlayer">
    <button id="closeMiniBtn" class="mini-close-btn" title="Close mini player" type="button" aria-label="Close mini player">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M5 5l14 14M19 5L5 19"/>
      </svg>
    </button>

    <div id="miniTitle" class="mini-title">No track loaded</div>

    <div class="mini-seek-row">
      <input id="miniSeek" type="range" min="0" max="100" value="0" />
      <span id="miniTime">0:00 / 0:00</span>
    </div>

    <div class="mini-controls">
      <button id="miniPrevBtn" class="icon-btn" title="Previous" type="button" aria-label="Previous">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 7l-5 5 5 5"/>
          <path d="M18 7l-5 5 5 5"/>
        </svg>
      </button>
      <button id="miniPlayPauseBtn" class="play-pause-btn" title="Play/Pause" type="button">
        <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="pause-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
        </svg>
      </button>
      <button id="miniNextBtn" class="icon-btn" title="Next" type="button" aria-label="Next">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 7l5 5-5 5"/>
          <path d="M6 7l5 5-5 5"/>
        </svg>
      </button>
      <input id="miniVol" type="range" min="0" max="1" step="0.01" value="0.8" />
    </div>
  </div>

  <script src="mini_renderer.js"></script>
</body>
</html>
