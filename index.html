<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
  <body>

    <!--The main container-->
    <div class="Music_player">
      <!--Display of the song cover-->
      <div class="Cover_display">
        <div id="cover">
          <img id="coverImg" src="display_cover.jpeg" alt="Song image cover here">
        </div>
      </div>

      <!--Display of the songs, controls, etc-->
      <div class="Console">
        <!--Other Options Panel-->
        <div class="options">
          <button id="openFolderBtn" class="icon-btn open-folder-btn" title="Open Folder" type="button" aria-label="Open Folder">
            <svg class="folder-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 7a2 2 0 0 1 2-2h4l2 2h7a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/>
              <path d="M3 10h18"/>
            </svg>
          </button>
          <button id="openFileBtn" class="icon-btn open-file-btn" title="Open File" type="button" aria-label="Open File">
            <svg class="file-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 3h8l5 5v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/>
              <path d="M14 3v5h5"/>
            </svg>
          </button>
          <button id="createSmallWindow" class="icon-btn create-mini-window-btn" title="Mini player" type="button" aria-label="Mini player">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="4" width="10" height="8" rx="1.2"></rect>
              <rect x="9" y="10" width="10" height="8" rx="1.2"></rect>
              <path d="M9 10V8"></path>
            </svg>
          </button>
          <span id="importStatus"></span>
        </div>

        <!--Song Selector/Displayer-->
        <div class="songs">
          <div id="title">No track loaded</div>
          <div id="trackList"></div>
        </div>

        <!--Search bar-->
        <div class="search_bar">
          <div id="search_input">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="text" placeholder="search for a song from above...">
          </div>
        </div>

        <!--Control Panel-->
        <div class="controls">
          <button id="prevBtn" class="icon-btn" title="Previous Song" type="button" aria-label="Previous Song">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 7l-5 5 5 5"/>
              <path d="M18 7l-5 5 5 5"/>
            </svg>
          </button>
          <button id="playPauseBtn" class="play-pause-btn" title="Play/Pause">
            <svg class="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
            </svg>
          </button>
          <button id="nextBtn" class="icon-btn" title="Next Song" type="button" aria-label="Next Song">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 7l5 5-5 5"/>
              <path d="M6 7l5 5-5 5"/>
            </svg>
          </button>
          <input id="seek" type="range" min="0" max="100" value="0" />
          <span id="time">0:00 / 0:00</span>
          <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8" />
        </div>

        <audio id="audio"></audio>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
